# render.yaml — Render Deployment Blueprint
# Docs: https://render.com/docs/blueprint-spec
#
# This file defines TWO services:
#   1. backend  — Node.js/Express API (Web Service)
#   2. frontend — React app (Static Site)
#
# HOW TO USE:
#   Push this file to your GitHub repo root, then on Render:
#   Dashboard → New → Blueprint → select your repo.

services:
  # ── 1. Backend: Express API ──────────────────────────
  - type: web
    name: final-project1-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8888
      - key: MONGO_URI
        sync: false          # Set this in Render dashboard (keep secret)
      - key: RAZORPAY_KEY_ID
        sync: false          # Set in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false          # Set in Render dashboard
      - key: CLIENT_URL
        # Replace with your actual frontend Render URL after first deploy
        value: https://final-project1-frontend.onrender.com

  # ── 2. Frontend: React Static Site ──────────────────
  - type: web
    name: final-project1-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://final-project1-d3iz.onrender.com
      - key: REACT_APP_RAZORPAY_KEY_ID
        value: rzp_test_Sk5c5WX2BfoT5L
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
